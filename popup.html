<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Leetcode Rank Search Tool</title>
    <style>
      :root {
        --bg: #000000;
        --panel: #0d0d0f;
        --surface: #141417;
        --surface-alt: #1c1c20;
        --border: #2a2b31;
        --primary: #38bdf8;
        --primary-hover: #0ea5e9;
        --danger: #f87171;
        --danger-hover: #ef4444;
        --muted: #9ca3af;
        --text-primary: #f8fafc;
        --text-secondary: #cbd5f5;
        --success: #22c55e;
        --warning: #facc15;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        min-width: 360px;
        width: 440px;
        font-family: 'Inter', 'SF Pro Text', 'Segoe UI', sans-serif;
        color: var(--text-primary);
        background: var(--bg);
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 24px 40px rgba(18, 22, 40, 0.18);
        position: relative;
        overflow: hidden;
        width: 100%;
        max-width: 480px;
      }

      .top-row {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
      }

      .title-block {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .subtitle {
        margin: 0;
        font-size: 12px;
        color: var(--text-secondary);
      }

      button {
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.18s ease, transform 0.18s ease;
      }

      button:focus-visible,
      .user-input:focus-visible {
        outline: 2px solid rgba(56, 189, 248, 0.65);
        outline-offset: 2px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .primary {
        background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
        color: #f8fafc;
        padding: 10px 14px;
      }

      .primary:not(:disabled):hover {
        background: linear-gradient(135deg, var(--primary-hover) 0%, #1e40af 100%);
        transform: translateY(-1px);
      }

      .danger {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.95) 0%, rgba(220, 38, 38, 0.95) 100%);
        color: #fef2f2;
        padding: 10px 14px;
      }

      .danger:not(:disabled):hover {
        background: linear-gradient(135deg, var(--danger-hover) 0%, #991b1b 100%);
        transform: translateY(-1px);
      }

      .secondary {
        background: rgba(37, 99, 235, 0.12);
        color: var(--primary);
        padding: 10px 14px;
        border: 1px solid rgba(37, 99, 235, 0.35);
      }

      .secondary:not(:disabled):hover {
        background: rgba(37, 99, 235, 0.2);
        transform: translateY(-1px);
      }

      #closeBtn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.08);
        color: var(--text-secondary);
        font-size: 18px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #closeBtn:hover {
        background: rgba(239, 68, 68, 0.15);
        color: var(--danger);
      }

      .card {
        background: var(--surface);
        border: 1px solid rgba(15, 23, 42, 0.06);
        border-radius: 14px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .section-title {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-secondary);
      }

      .ghost-btn {
        background: rgba(56, 189, 248, 0.12);
        color: var(--primary);
        border: 1px solid rgba(56, 189, 248, 0.45);
        padding: 6px 10px;
        border-radius: 14px;
      }

      .ghost-btn:hover {
        background: rgba(56, 189, 248, 0.25);
      }

      .user-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 260px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .user-row {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 36px;
        grid-template-rows: auto auto;
        grid-template-areas:
          'input remove'
          'status status';
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        background: var(--surface-alt);
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }

      .user-row[data-state='searching'] {
        border-color: rgba(56, 189, 248, 0.65);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35);
      }

      .user-row[data-state='done'] {
        border-color: rgba(34, 197, 94, 0.45);
      }

      .user-row:hover {
        transform: translateY(-1px);
      }

      .user-input {
        grid-area: input;
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: var(--surface);
        color: var(--text-primary);
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 13px;
        box-shadow: 0 4px 10px rgba(15, 23, 42, 0.3);
      }

      .user-input::placeholder {
        color: rgba(71, 85, 105, 0.5);
      }

      .user-status {
        grid-area: status;
        display: flex;
        align-items: flex-start;
        gap: 6px;
        color: var(--text-primary);
        font-size: 12px;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        justify-self: flex-start;
        min-height: 18px;
        flex-wrap: wrap;
        line-height: 1.4;
      }

      .user-status.not-found {
        color: var(--danger);
        font-weight: 600;
      }

      .user-status.found {
        color: var(--success);
        font-weight: 600;
      }

      .user-status.error {
        color: var(--warning);
        font-weight: 600;
      }

      .user-status a {
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.2);
        color: var(--text-primary);
        text-decoration: none;
        font-size: 11px;
        transition: background 0.2s ease, color 0.2s ease;
      }

      .user-status a:hover {
        background: rgba(56, 189, 248, 0.35);
        color: var(--bg);
      }

      .remove-btn {
        grid-area: remove;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(148, 163, 184, 0.12);
        color: var(--text-secondary);
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .remove-btn:hover:not(:disabled) {
        background: rgba(248, 113, 113, 0.15);
        color: var(--danger);
      }

      .controls-card {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .controls-card button {
        min-height: 42px;
      }

      .status-card {
        display: grid;
        gap: 12px;
      }

      .metric {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        background: var(--surface-alt);
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.2);
      }

      .metric-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .metric-value {
        font-size: 13px;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
      }

      .badge {
        padding: 4px 10px;
        border-radius: 20px;
        background: rgba(56, 189, 248, 0.18);
        color: var(--text-primary);
      }

      #status[data-state='success'] {
        background: rgba(34, 197, 94, 0.18);
        color: var(--success);
      }

      #status[data-state='warning'] {
        background: rgba(250, 204, 21, 0.18);
        color: var(--warning);
      }

      #status[data-state='error'] {
        background: rgba(239, 68, 68, 0.18);
        color: var(--danger);
      }

      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(148, 163, 184, 0.55);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .status-pill {
        padding: 2px 10px;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.15);
        color: inherit;
      }

      .user-status.not-found .status-pill,
      .user-status.error .status-pill {
        background: rgba(248, 113, 113, 0.2);
      }

      .status-meta {
        color: var(--text-secondary);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 360px) {
        body {
          padding: 16px;
        }

        .panel {
          padding: 16px;
        }

        .controls-card {
          grid-template-columns: 1fr;
        }

        .user-row {
          grid-template-columns: 1fr;
          grid-template-areas:
            'input'
            'status'
            'remove';
          row-gap: 8px;
        }

        .remove-btn {
          justify-self: end;
        }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="top-row">
        <div class="title-block">
          <h1>Leetcode Rank Search Tool</h1>
        </div>
        <button id="closeBtn" type="button" aria-label="Close panel">×</button>
      </div>

      <section class="card">
        <div class="card-header">
          <span class="section-title">Tracked Users</span>
          <button id="addUserBtn" type="button" class="ghost-btn">＋ Add User</button>
        </div>
        <div id="userList" class="user-list" aria-live="polite"></div>
      </section>

      <section class="card controls-card">
        <button id="startBtn" type="button" class="primary">Start</button>
        <button id="stopBtn" type="button" class="danger" disabled>Stop</button>
        <button id="clearCacheBtn" type="button" class="secondary">Clear Cache</button>
      </section>

      <section class="card status-card">
        <div class="metric">
          <span class="metric-label">Status</span>
          <span id="status" class="metric-value badge" data-state="idle">Idle</span>
        </div>
        <div class="metric">
          <span class="metric-label">Progress</span>
          <span id="progress" class="metric-value">Idle</span>
        </div>
      </section>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
